services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: misekin
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: misekin
    volumes:
      - db_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U misekin"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    ports:
      - "127.0.0.1:3003:3000"
    environment:
      DATABASE_URL: postgresql://misekin:${POSTGRES_PASSWORD}@db:5432/misekin
      AUTH_SECRET: ${AUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      NEXT_PUBLIC_APP_URL: ${NEXTAUTH_URL}
      NEXT_PUBLIC_BASE_PATH: /dev/misekin
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-みせ勤 <noreply@dataraw.jp>}
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  db_data:
